# Caller stub: release trigger (stage 2).
#
# pull_request_target cannot live in the reusable workflow, so it lives here.
# The instant a release PR merges, this forwards the PR number to the reusable
# validate workflow, which performs the full merged-PR forensics and dispatches
# the release. The workflow never checks out PR head code, so pull_request_target
# is safe here.

name: Trigger release

on:
    pull_request_target:
        types: [closed]
    # Recovery path: re-validate an already-merged release PR (e.g. after a
    # toolkit pin bump fixes a validation bug). The reusable workflow re-derives
    # everything from the PR number and fails closed, so a bad number cannot
    # dispatch a release. Dispatch it from the default branch; any other ref is
    # rejected.
    workflow_dispatch:
        inputs:
            pr-number:
                description: "Merged release PR number to re-validate"
                required: true
                type: string

permissions: {}

concurrency:
    group: release-trigger
    cancel-in-progress: false

jobs:
    validate:
        if: >-
            github.event_name == 'workflow_dispatch' ||
            (github.event.pull_request.merged == true &&
             github.event.pull_request.base.ref == 'master' &&
             startsWith(github.event.pull_request.head.ref, 'release/'))
        permissions:
            actions: write
            contents: write
            pull-requests: read
        uses: chhoumann/obsidian-plugin-workflows/.github/workflows/release-validate.yml@v3
        with:
            pr-number: ${{ github.event.pull_request.number || inputs.pr-number }}
            plugin-name: metaedit
            package-manager: pnpm
            default-branch: master
            release-bot-app-slug: metaedit-release-bot
            release-workflow: release.yml
